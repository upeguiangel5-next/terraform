name: Terraform CI — Lab15 DevSecOps Pipeline

on:
  push:
    branches: [main]
    paths:
      - "terraform/**"
      - "policies/**"
  pull_request:
    branches: [main]
    paths:
      - "terraform/**"
      - "policies/**"

permissions:
  id-token: write   # Requerido para solicitar el token OIDC
  contents: read    # Requerido para actions/checkout

env:
  AWS_REGION: eu-north-1
  TF_DIR: terraform

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Job 1: Escaneo de seguridad estático (sin credenciales AWS)
  # ─────────────────────────────────────────────────────────────────────────
  security-scan:
    name: Escaneo de seguridad IaC
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v6

      # ── Checkov: análisis de compliance ──────────────────────────────────
      - name: Checkov — escaneo de configuraciones Terraform
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: ${{ env.TF_DIR }}
          framework: terraform
          output_format: cli
          download_external_modules: false

      # ── Trivy: análisis de seguridad IaC (sucesor de tfsec) ──────────────
      - name: Trivy — análisis de seguridad IaC
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          version: v0.70.0
          scan-type: config
          scan-ref: ${{ env.TF_DIR }}
          severity: MEDIUM,HIGH,CRITICAL
          exit-code: "1"

      # ── OPA/Conftest: políticas personalizadas ────────────────────────────
      - name: Conftest — validación de políticas OPA/Rego
        run: |
          # Instalar conftest (>= 0.56 entiende if/contains/in sin imports explícitos)
          CONFTEST_VERSION="0.68.2"
          curl -sL "https://github.com/open-policy-agent/conftest/releases/download/v${CONFTEST_VERSION}/conftest_${CONFTEST_VERSION}_Linux_x86_64.tar.gz" \
            | tar xz conftest
          sudo mv conftest /usr/local/bin/

          # Validar el código Terraform contra las políticas Rego.
          # conftest no descubre .tf automáticamente: se pasan con glob explícito.
          conftest test ${{ env.TF_DIR }}/*.tf \
            --policy policies/ \
            --parser hcl2 \
            --all-namespaces \
            --no-color

  # ─────────────────────────────────────────────────────────────────────────
  # Job 2: Terraform plan (en PR y en push a main) — requiere OIDC
  # En push a main genera el tfplan que apply reutiliza (sin plan drift).
  # ─────────────────────────────────────────────────────────────────────────
  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs: security-scan
    # Corre en PRs (para que el reviewer vea el plan) y también en push a main
    # (para que apply reutilice ese plan exacto - evita el "plan drift").
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    environment: aws-readonly   # Entorno de GitHub con aprobación opcional

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v6

      # ── Autenticación OIDC: sin AWS_ACCESS_KEY_ID ni AWS_SECRET_ACCESS_KEY ─
      - name: Configurar credenciales AWS via OIDC
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}  # ARN del output github_actions_role_arn
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActions-Lab15-Plan

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "~> 1.10"

      - name: Terraform Init
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform init \
            -backend-config=aws.s3.tfbackend \
            -backend-config="bucket=terraform-state-labs-$(aws sts get-caller-identity --query Account --output text)"

      - name: Terraform Validate
        working-directory: ${{ env.TF_DIR }}
        run: terraform validate

      - name: Terraform Plan
        working-directory: ${{ env.TF_DIR }}
        # Si tu código necesita variables, ponlas en un fichero
        # *.auto.tfvars dentro de TF_DIR — Terraform las cargará automáticamente.
        run: terraform plan -out=tfplan

      - name: Guardar plan como artefacto
        uses: actions/upload-artifact@v7
        with:
          name: tfplan
          path: ${{ env.TF_DIR }}/tfplan
          retention-days: 1

  # ─────────────────────────────────────────────────────────────────────────
  # Job 3: Terraform apply (sólo en push a main, tras aprobación manual)
  # ─────────────────────────────────────────────────────────────────────────
  terraform-apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    # Depende de plan: ahora plan también corre en push a main, así que apply
    # reutiliza el artefacto tfplan generado en este mismo run (sin plan drift).
    needs: [security-scan, terraform-plan]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: aws-production   # Requiere aprobación manual en GitHub

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v6

      - name: Configurar credenciales AWS via OIDC
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActions-Lab15-Apply

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "~> 1.10"

      - name: Terraform Init
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform init \
            -backend-config=aws.s3.tfbackend \
            -backend-config="bucket=terraform-state-labs-$(aws sts get-caller-identity --query Account --output text)"

      # Descargar el plan generado por terraform-plan en este mismo run.
      # Aplicarlo directamente garantiza que apply ejecuta exactamente lo que
      # se planificó - sin plan drift entre validación y ejecución.
      - name: Descargar artefacto del plan
        uses: actions/download-artifact@v8
        with:
          name: tfplan
          path: ${{ env.TF_DIR }}

      - name: Terraform Apply
        working-directory: ${{ env.TF_DIR }}
        run: terraform apply tfplan
